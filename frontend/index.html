<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>repochat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;1,300&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0a0b;
    --surface:   #111114;
    --border:    #1e1e24;
    --border-2:  #2a2a33;
    --text:      #c8c8d4;
    --text-dim:  #5a5a6e;
    --text-faint:#2e2e38;
    --accent:    #5bf5a0;
    --accent-dim:#1a4a32;
    --accent-glow: 0 0 24px rgba(91,245,160,0.18);
    --warn:      #f5a25b;
    --err:       #f55b5b;
    --radius:    4px;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    line-height: 1.65;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Layout ─────────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    padding: 28px 0 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-size: 17px;
    font-weight: 500;
    letter-spacing: -0.5px;
    color: var(--accent);
    text-shadow: var(--accent-glow);
  }
  .logo span { color: var(--text-dim); font-weight: 300; }

  .tagline {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    font-weight: 300;
  }

  .status-dot {
    margin-left: auto;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-faint);
    transition: background 0.3s, box-shadow 0.3s;
  }
  .status-dot.online { background: var(--accent); box-shadow: var(--accent-glow); }

  /* ── Main content area ───────────────────────────────────────── */
  main {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 20px 0 0;
  }

  /* ── Repo input panel ───────────────────────────────────────── */
  #repo-panel {
    flex-shrink: 0;
    margin-bottom: 16px;
    transition: all 0.4s ease;
  }

  .input-label {
    font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .repo-input-row {
    display: flex;
    gap: 8px;
    align-items: stretch;
  }

  input[type="text"] {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--accent);
  }
  input[type="text"]::placeholder { color: var(--text-faint); }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-dim);
  }

  button {
    background: transparent;
    border: 1px solid var(--border-2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 10px 18px;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: border-color 0.2s, color 0.2s, background 0.2s;
    white-space: nowrap;
  }
  button:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
  button:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }
  button.primary {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }
  button.primary:hover {
    background: rgba(91,245,160,0.18);
    box-shadow: var(--accent-glow);
  }

  /* ── Repo badge (shown after indexing) ──────────────────────── */
  #repo-badge {
    display: none;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: var(--radius);
    font-size: 12px;
    margin-bottom: 16px;
  }
  #repo-badge.visible { display: flex; }
  .badge-repo { color: var(--accent); font-weight: 500; }
  .badge-meta { color: var(--text-dim); font-size: 11px; }
  .badge-change {
    margin-left: auto;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    background: none;
    border: none;
    padding: 0;
    font-family: var(--mono);
  }
  .badge-change:hover { color: var(--accent); border: none; background: none; box-shadow: none; }

  /* ── Index progress ─────────────────────────────────────────── */
  #progress-bar-wrap {
    display: none;
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  #progress-bar-wrap.visible { display: block; }
  #progress-bar {
    height: 100%;
    width: 0%;
    background: var(--accent);
    box-shadow: var(--accent-glow);
    transition: width 0.3s ease;
    border-radius: 2px;
  }

  /* ── Chat area ───────────────────────────────────────────────── */
  #chat-area {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border-2) transparent;
  }
  #chat-area::-webkit-scrollbar { width: 4px; }
  #chat-area::-webkit-scrollbar-track { background: transparent; }
  #chat-area::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

  /* Placeholder state */
  #chat-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    color: var(--text-faint);
    user-select: none;
    padding: 40px 0;
  }
  .placeholder-glyph {
    font-size: 32px;
    opacity: 0.4;
    letter-spacing: -2px;
    color: var(--text-dim);
  }
  .placeholder-text { font-size: 12px; color: var(--text-faint); }

  /* ── Messages ───────────────────────────────────────────────── */
  .msg {
    display: grid;
    grid-template-columns: 80px 1fr;
    gap: 0 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeSlide 0.2s ease forwards;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg-role {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding-top: 2px;
    font-weight: 500;
  }
  .msg-role.user  { color: var(--text-dim); }
  .msg-role.assistant { color: var(--accent); }
  .msg-role.system { color: var(--warn); }

  .msg-body { color: var(--text); }
  .msg-body p { margin-bottom: 8px; }
  .msg-body p:last-child { margin-bottom: 0; }
  .msg-body code {
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 12px;
    color: var(--accent);
  }
  .msg-body pre {
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: var(--radius);
    padding: 12px 14px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 12px;
    line-height: 1.55;
  }
  .msg-body pre code { background: none; border: none; padding: 0; color: inherit; }

  /* Source citations */
  .sources {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .source-item {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    align-items: baseline;
    gap: 8px;
    cursor: pointer;
    padding: 5px 8px;
    border-radius: var(--radius);
    border: 1px solid transparent;
    transition: border-color 0.15s, background 0.15s;
  }
  .source-item:hover {
    border-color: var(--border-2);
    background: var(--surface);
  }
  .source-path { color: var(--accent); font-size: 11px; }
  .source-score { color: var(--text-faint); font-size: 10px; }
  .source-snippet {
    display: none;
    margin-top: 6px;
    padding: 8px 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 11px;
    color: var(--text-dim);
    white-space: pre-wrap;
    max-height: 140px;
    overflow-y: auto;
  }
  .source-item.open .source-snippet { display: block; }

  /* Thinking indicator */
  .thinking {
    display: flex;
    gap: 4px;
    align-items: center;
    padding-top: 2px;
  }
  .thinking span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40%           { opacity: 1;   transform: scale(1); }
  }

  /* ── Footer / chat input ─────────────────────────────────────── */
  footer {
    padding: 16px 0 20px;
    border-top: 1px solid var(--border);
  }

  .chat-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #chat-input {
    flex: 1;
    resize: none;
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    min-height: 42px;
    max-height: 140px;
    line-height: 1.55;
    transition: border-color 0.2s, box-shadow 0.2s;
    caret-color: var(--accent);
    scrollbar-width: thin;
    scrollbar-color: var(--border-2) transparent;
  }
  #chat-input::placeholder { color: var(--text-faint); }
  #chat-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-dim);
  }
  #chat-input:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn {
    height: 42px;
    padding: 0 16px;
    flex-shrink: 0;
  }

  .hint {
    margin-top: 8px;
    font-size: 10px;
    color: var(--text-faint);
    display: flex;
    gap: 16px;
  }
  .hint kbd {
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
  }

  /* ── Notification toast ─────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface);
    border: 1px solid var(--border-2);
    border-radius: var(--radius);
    padding: 10px 18px;
    font-size: 12px;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 999;
    max-width: 480px;
    text-align: center;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  #toast.error { border-color: var(--err); color: var(--err); }
  #toast.success { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <div class="logo">repo<span>/</span>chat</div>
    <div class="tagline">llama_index · rag · groq</div>
    <div class="status-dot" id="status-dot"></div>
  </header>

  <!-- Main -->
  <main>

    <!-- Repo input panel -->
    <div id="repo-panel">
      <label class="input-label" for="repo-url">repository</label>
      <div class="repo-input-row">
        <input
          type="text"
          id="repo-url"
          placeholder="https://github.com/owner/repo"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="index-btn" class="primary" onclick="handleIndex()">
          index →
        </button>
      </div>
    </div>

    <!-- Progress bar -->
    <div id="progress-bar-wrap">
      <div id="progress-bar"></div>
    </div>

    <!-- Repo badge (post-index) -->
    <div id="repo-badge">
      <span class="badge-repo" id="badge-repo-name"></span>
      <span class="badge-meta" id="badge-meta"></span>
      <button class="badge-change" onclick="resetRepo()">change</button>
    </div>

    <!-- Chat area -->
    <div id="chat-area">
      <div id="chat-placeholder">
        <div class="placeholder-glyph">{ _ }</div>
        <div class="placeholder-text">index a repository to start chatting</div>
      </div>
    </div>

  </main>

  <!-- Footer / chat input -->
  <footer>
    <div class="chat-input-row">
      <textarea
        id="chat-input"
        placeholder="ask anything about the codebase…"
        rows="1"
        disabled
      ></textarea>
      <button id="send-btn" onclick="handleSend()" disabled>send</button>
    </div>
    <div class="hint">
      <span><kbd>Enter</kbd> send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> newline</span>
    </div>
  </footer>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── State ───────────────────────────────────────────────────────────────────
const state = {
  repoKey: null,
  repoName: null,
  indexing: false,
  thinking: false,
};

// ── API base URL ─────────────────────────────────────────────────────────────
// Priority:
//   1. NEXT_PUBLIC_API_URL injected at build time by Vercel
//   2. Local file or localhost → hit localhost:8000
//   3. Same-origin deployment (fallback)
const _injected = "__NEXT_PUBLIC_API_URL__";  // replaced by Vercel build if set
const _origin = window.location.origin;
const API_BASE = (_injected && !_injected.startsWith("__"))
  ? _injected
  : (_origin === "null" || _origin.includes("localhost") || _origin.includes("127.0.0.1"))
    ? "http://localhost:8000"
    : _origin;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const repoUrl    = document.getElementById("repo-url");
const indexBtn   = document.getElementById("index-btn");
const progressWrap = document.getElementById("progress-bar-wrap");
const progressBar  = document.getElementById("progress-bar");
const repoBadge  = document.getElementById("repo-badge");
const badgeRepo  = document.getElementById("badge-repo-name");
const badgeMeta  = document.getElementById("badge-meta");
const chatArea   = document.getElementById("chat-area");
const placeholder = document.getElementById("chat-placeholder");
const chatInput  = document.getElementById("chat-input");
const sendBtn    = document.getElementById("send-btn");
const statusDot  = document.getElementById("status-dot");
const toast      = document.getElementById("toast");

// ── Health check ─────────────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${API_BASE}/api/health`);
    if (r.ok) statusDot.classList.add("online");
  } catch { /* backend unreachable */ }
}
checkHealth();

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = "") {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = "show" + (type ? ` ${type}` : "");
  toastTimer = setTimeout(() => { toast.className = ""; }, 3800);
}

// ── Progress animation ────────────────────────────────────────────────────────
function startProgress() {
  progressBar.style.width = "0%";
  progressWrap.classList.add("visible");
  let w = 0;
  const iv = setInterval(() => {
    w = Math.min(w + Math.random() * 8, 85);
    progressBar.style.width = w + "%";
  }, 400);
  return iv;
}
function finishProgress(iv) {
  clearInterval(iv);
  progressBar.style.width = "100%";
  setTimeout(() => { progressWrap.classList.remove("visible"); progressBar.style.width = "0%"; }, 500);
}

// ── Index repo ────────────────────────────────────────────────────────────────
async function handleIndex() {
  const url = repoUrl.value.trim();
  if (!url) { showToast("paste a github url first.", "error"); return; }
  if (state.indexing) return;

  state.indexing = true;
  indexBtn.disabled = true;
  indexBtn.textContent = "indexing…";

  const iv = startProgress();
  try {
    const resp = await fetch(`${API_BASE}/api/index-repo`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ github_url: url }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);

    state.repoKey = data.repo_key;
    state.repoName = `${data.owner}/${data.repo}`;
    finishProgress(iv);

    // Show badge, hide input panel
    document.getElementById("repo-panel").style.display = "none";
    badgeRepo.textContent = state.repoName;
    const cached = data.cached ? " (cached)" : ` · ${data.file_count ?? "?"} files`;
    badgeMeta.textContent = `ref: ${data.ref || "HEAD"}${cached}`;
    repoBadge.classList.add("visible");

    // Enable chat
    chatInput.disabled = false;
    sendBtn.disabled = false;
    chatInput.focus();

    // Remove placeholder
    placeholder.style.display = "none";

    addSystemMsg(`indexed **${state.repoName}** — ask me anything about the codebase.`);
    showToast(`${state.repoName} indexed ✓`, "success");

  } catch (e) {
    finishProgress(iv);
    showToast(`indexing failed: ${e.message}`, "error");
    addSystemMsg(`⚠ indexing failed: ${e.message}`);
  } finally {
    state.indexing = false;
    indexBtn.disabled = false;
    indexBtn.textContent = "index →";
  }
}

// ── Reset repo ────────────────────────────────────────────────────────────────
function resetRepo() {
  state.repoKey = null;
  state.repoName = null;
  repoUrl.value = "";
  repoBadge.classList.remove("visible");
  document.getElementById("repo-panel").style.display = "";
  chatInput.disabled = true;
  sendBtn.disabled = true;
  clearChat();
}

// ── Chat ──────────────────────────────────────────────────────────────────────
async function handleSend() {
  const q = chatInput.value.trim();
  if (!q || state.thinking || !state.repoKey) return;

  addMsg("user", q);
  chatInput.value = "";
  autoResize();

  state.thinking = true;
  sendBtn.disabled = true;
  const thinkEl = addThinking();

  try {
    const resp = await fetch(`${API_BASE}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ repo_key: state.repoKey, question: q }),
    });
    const data = await resp.json();
    thinkEl.remove();
    if (!resp.ok) throw new Error(data.detail || `HTTP ${resp.status}`);
    addMsg("assistant", data.answer, data.sources || []);
  } catch (e) {
    thinkEl.remove();
    addMsg("assistant", `⚠ ${e.message}`);
  } finally {
    state.thinking = false;
    sendBtn.disabled = false;
    chatInput.focus();
  }
}

// ── Message rendering ─────────────────────────────────────────────────────────
function addMsg(role, text, sources = []) {
  const div = document.createElement("div");
  div.className = "msg";

  const roleEl = document.createElement("div");
  roleEl.className = `msg-role ${role}`;
  roleEl.textContent = role === "assistant" ? "repochat" : "you";

  const bodyEl = document.createElement("div");
  bodyEl.className = "msg-body";
  bodyEl.innerHTML = renderMarkdown(text);

  if (sources.length > 0) {
    const srcDiv = document.createElement("div");
    srcDiv.className = "sources";
    sources.forEach(s => {
      const item = document.createElement("div");
      item.className = "source-item";
      item.innerHTML = `
        <span class="source-path">${escHtml(s.file_path)}</span>
        ${s.score != null ? `<span class="source-score">${s.score.toFixed(3)}</span>` : ""}
        <div class="source-snippet">${escHtml((s.snippet || "").trim())}</div>
      `;
      item.addEventListener("click", () => item.classList.toggle("open"));
      srcDiv.appendChild(item);
    });
    bodyEl.appendChild(srcDiv);
  }

  div.appendChild(roleEl);
  div.appendChild(bodyEl);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addSystemMsg(text) {
  const div = document.createElement("div");
  div.className = "msg";
  const roleEl = document.createElement("div");
  roleEl.className = "msg-role system";
  roleEl.textContent = "sys";
  const bodyEl = document.createElement("div");
  bodyEl.className = "msg-body";
  bodyEl.innerHTML = renderMarkdown(text);
  div.appendChild(roleEl);
  div.appendChild(bodyEl);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addThinking() {
  const div = document.createElement("div");
  div.className = "msg";
  const roleEl = document.createElement("div");
  roleEl.className = "msg-role assistant";
  roleEl.textContent = "repochat";
  const bodyEl = document.createElement("div");
  bodyEl.className = "msg-body";
  bodyEl.innerHTML = '<div class="thinking"><span></span><span></span><span></span></div>';
  div.appendChild(roleEl);
  div.appendChild(bodyEl);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function clearChat() {
  chatArea.innerHTML = "";
  const ph = document.createElement("div");
  ph.id = "chat-placeholder";
  ph.innerHTML = '<div class="placeholder-glyph">{ _ }</div><div class="placeholder-text">index a repository to start chatting</div>';
  chatArea.appendChild(ph);
}

// ── Minimal markdown → HTML ───────────────────────────────────────────────────
function renderMarkdown(text) {
  let html = escHtml(text);
  // Code blocks
  html = html.replace(/```[\w]*\n?([\s\S]*?)```/g, (_, code) =>
    `<pre><code>${code.trimEnd()}</code></pre>`);
  // Inline code
  html = html.replace(/`([^`]+)`/g, "<code>$1</code>");
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  // Italic
  html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
  // Line breaks → paragraphs
  const paras = html.split(/\n\n+/);
  if (paras.length > 1) {
    html = paras.map(p => `<p>${p.replace(/\n/g, "<br>")}</p>`).join("");
  } else {
    html = `<p>${html.replace(/\n/g, "<br>")}</p>`;
  }
  return html;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Textarea auto-resize ──────────────────────────────────────────────────────
function autoResize() {
  chatInput.style.height = "auto";
  chatInput.style.height = Math.min(chatInput.scrollHeight, 140) + "px";
}
chatInput.addEventListener("input", autoResize);

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
chatInput.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});
repoUrl.addEventListener("keydown", e => {
  if (e.key === "Enter") handleIndex();
});
</script>
